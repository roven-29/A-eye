<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>A-eye — VisionVoice AI</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Theme & Status Bar -->
  <meta name="theme-color" content="#00d4ff">
  <meta name="background-color" content="#0d0f1a">

  <!-- iOS Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="A-eye">
  <link rel="apple-touch-icon" href="icon-512.png">

  <!-- Android / General -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="A-eye">
  <meta name="description" content="AI-powered voice assistant for the visually impaired.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <h1>A-eye</h1>
      <p>AI assistant for the visually impaired</p>
    </header>

    <div id="start-overlay" class="start-overlay">
      <div class="tap-anywhere-prompt">
        <div class="tap-icon">👆</div>
        <p class="tap-label">Tap anywhere to start</p>
      </div>
    </div>

    <main class="main-content">
      <div class="video-container">
        <video id="video-feed" class="video-feed" autoplay playsinline muted></video>
        
        <div id="status-overlay" class="status-overlay hidden">
          <p id="transcript" class="transcript">Initializing...</p>
          <div id="status-badge" class="status-badge status-idle">
            IDLE
          </div>
          <div class="mode-controls">
            <p class="hint-text">Just speak — I'm always listening</p>
          </div>
        </div>
      </div>
    </main>
  </div>


  <script src="script.js"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
